<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f5ff"/>
      <stop offset="50%" stop-color="#ff00ff"/>
      <stop offset="100%" stop-color="#ffd86b"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="4.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      text {
        font-family: "Poppins", "Segoe UI", sans-serif;
        font-weight: 700;
        fill: url(#grad);
        font-size: 72px;
        text-anchor: middle;
        filter: url(#glow);
      }
      .username {
        font-size: 20px;
        font-weight: 500;
        fill: #ccc;
      }

      /* gradient animation */
      @keyframes gradientShift {
        0% { transform: translateX(-20%); }
        100% { transform: translateX(20%); }
      }

      /* snake movement */
      @keyframes snakeMove {
        0% { offset-distance: 0%; }
        100% { offset-distance: 100%; }
      }

      /* particle style */
      .dot {
        r: 4;
        fill: #00e1ff;
        offset-path: path("M150,120 Q400,20 650,120");
        animation: snakeMove 6s linear infinite;
      }
      .dot:nth-child(2) {
        fill: #ff00ff;
        animation-delay: 0.8s;
      }
      .dot:nth-child(3) {
        fill: #ffd86b;
        animation-delay: 1.6s;
      }

      .bg {
        fill: #0a0a0f;
        opacity: 0.9;
        rx: 14;
        ry: 14;
      }
    </style>
  </defs>

  <!-- background -->
  <rect class="bg" x="0" y="0" width="800" height="200"/>

  <!-- animated gradient overlay -->
  <g style="animation: gradientShift 4s ease-in-out infinite alternate;">
    <rect x="0" y="0" width="800" height="200" fill="url(#grad)" opacity="0.08"/>
  </g>

  <!-- main text -->
  <text x="400" y="110">Anant</text>
  <text x="400" y="150" class="username">@anant23452</text>

  <!-- snake animation dots -->
  <circle class="dot"/>
  <circle class="dot"/>
  <circle class="dot"/>
</svg>
